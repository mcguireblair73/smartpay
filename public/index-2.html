function signIn() {
        

        var card = document.getElementById('loadingCard');
        card.setAttribute('class' , 'main-content container-fluid be-loading-active');

     if (firebase.auth().currentUser) 
     {
        
        firebase.auth().signOut();
        
    } 
    else 
    {

        
        var email = emailTextField.value;
        var password = passwordTextField.value;
        
        
        if (email.length < 4) {
          alert('Please enter an email address.');
          return;
        }
        if (password.length < 4) {
          alert('Please enter a password.');
          return;
        }
        // Sign in with email and pass.
        
        
        firebase.auth().signInWithEmailAndPassword(email, password).catch(function(error) {


        if(error)
        {
                  var card = document.getElementById('loadingCard');
                  card.setAttribute('class' , 'main-content container-fluid be-loading');
            // Handle Errors here.

        
          var errorCode = error.code;
          var errorMessage = error.message;
          if (errorCode === 'auth/wrong-password') {
            

              var headerModal = document.getElementById('failureDescription');
              headerModal.innerText = 'Wrong password.'
              $('#noPermissionModal').modal('show');

          } else {

              var headerModal = document.getElementById('failureDescription');
              headerModal.innerText = errorMessage
              $('#noPermissionModal').modal('show');
