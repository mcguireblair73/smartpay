function addRowInList( selectionBoxID, storeName)
{


    var signUpDate = document.getElementById(selectionBoxID);
        var value = document.createElement("option");
        value.innerText = storeName;        
        signUpDate.appendChild(value);

}






function  machineSelectedHandler(machineID)
{

    window.location.href = 'machine.html#!/' + machineID;
}


function createRowInTable(location, machine, machineType, price ,enabled, coinCount)
{

        var tbl = document.getElementById('tbody1');

             var row = document.createElement("tr");
             row.setAttribute('onClick',"machineSelectedHandler(\"" + machine+ "\")");
       
       // create cells in row
             for (var c = 0; c < 6; c++) {
                var cell = document.createElement("td");
    
              if(c ==0)
              {
                var cellText = document.createTextNode(location);
                cell.appendChild(cellText);
                row.appendChild(cell);
              }
              else if(c ==1)
              {
                var cellText = document.createTextNode(machine);
                cell.appendChild(cellText);
                row.appendChild(cell);
              }
              else if(c==2)
              {

              
                if(!machineType)
                  machineType = 'Not set'
                var cellText = document.createTextNode(machineType);
                cell.appendChild(cellText);
                row.appendChild(cell);
              }
              else if(c==3)
              {
                var pricesStr = '';
                for(var i =0; i<price.length; i++)
                {
                  if(i!=0)
                  pricesStr += ' ; '
                  pricesStr = pricesStr + price[i].name + ' : $' + price[i].price.toFixed(2)
                }

                var cellText = document.createTextNode(pricesStr);
                cell.appendChild(cellText);
                row.appendChild(cell);
              }
              else if(c==4)
              {
                var enabledStr = '';
                if(enabled)
                {
                  enabledStr = 'Enabled';
                }
                else
                {
                  enabledStr = 'Disabled'
                }


                var cellText = document.createTextNode(enabledStr);
                cell.appendChild(cellText);
                row.appendChild(cell);
              }
              else if(c==5)
              {
                
                
                var cellText = document.createTextNode(coinCount);
                cell.appendChild(cellText);
                row.appendChild(cell);
              }


              }
            tbl.appendChild(row); // add the row to the end of the table body



}
